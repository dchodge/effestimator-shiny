name: Deploy to shinyapps.io

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true   # pre-compiled binaries — much faster

      - name: Install Linux system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            g++ cmake make

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-release-${{ hashFiles('DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-release-

      - name: Install R packages
        run: |
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))
          install.packages(c(
            "StanHeaders", "RcppParallel", "RcppEigen", "inline", "loo",
            "rstan",
            "shiny", "bslib", "DT", "shinyjs",
            "ggplot2", "patchwork",
            "posterior", "tidybayes",
            "readr", "tibble", "dplyr", "tidyr", "purrr",
            "rsconnect"
          ))
        shell: Rscript {0}

      - name: Pre-compile Stan models
        run: |
          # Compile both Stan models on the CI runner (Ubuntu, same OS as
          # shinyapps.io). save_dso=TRUE embeds the compiled .so into the .rds
          # so no compilation happens at runtime --- shinyapps.io free tier
          # runs OOM during g++ compilation of Stan code.
          rstan::rstan_options(auto_write = FALSE)
          options(mc.cores = 1L)
          for (f in c("stan/eff_est.stan", "stan/eff_est_none.stan")) {
            message("Compiling: ", f)
            code <- paste(readLines(f, warn = FALSE), collapse = "\n")
            mod  <- rstan::stan_model(model_code = code, save_dso = TRUE,
                                      verbose = FALSE, auto_write = FALSE)
            out  <- sub("\\.stan$", "_compiled.rds", f)
            saveRDS(mod, file = out)
            message("Saved: ", out)
          }
        shell: Rscript {0}

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir      = ".",
            appName     = "effestimator",
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        shell: Rscript {0}
